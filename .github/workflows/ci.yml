name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git python3 python3-venv python3-pip curl ca-certificates
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Install Chromium system deps
        run: bash test-deps/setup.sh
      - name: Install test server deps
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r test_server/requirements.txt -q
      - name: Build and test
        run: npm test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git curl ca-certificates
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci && npm run build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app.min.js
            index.html
            pico.jade.min.css
