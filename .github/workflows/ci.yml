name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git python3 python3-venv python3-pip curl ca-certificates \
            libglib2.0-0 libnss3 libnspr4 libdbus-1-3 libatk1.0-0 \
            libatk-bridge2.0-0 libatspi2.0-0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libasound2 \
            libcups2 libpango-1.0-0 libcairo2
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Install test server deps
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r test_server/requirements.txt -q
      - name: Build and test
        run: |
          . .venv/bin/activate
          npm test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: debian:trixie-slim
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git curl ca-certificates
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci && npm run build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            app.min.js
            index.html
            pico.jade.min.css
